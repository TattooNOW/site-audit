*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── LOADING OVERLAY ─── */
.loading-overlay {

  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
.loading-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.loading-spinner {
  width: 44px; height: 44px;
  border: 4px solid var(--accent-dim);
  border-top: 4px solid var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 1.25rem;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Roboto Slab', serif;
  color: var(--text-primary);
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.35rem;
}
.loading-subtext {
  font-family: 'Roboto', sans-serif;
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* Main content hidden until loaded */
.app { opacity: 0; transition: opacity 0.4s ease; }
.app.loaded { opacity: 1; }

body {

  background: var(--bg-deep);
  color: var(--text-primary);

.app { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* ─── HEADER ─── */
.header { margin-bottom: 32px; }

.header-sub { font-size: 14px; color: var(--text-secondary); }

/* ─── LOCATION DEBUG ─── */

.location-debug strong { color: var(--accent); }
.sync-status { display: inline-block; font-size: 11px; color: var(--text-muted); margin-left: 8px; transition: color 0.3s; }
.sync-status.saving { color: var(--yellow); }
.sync-status.saved { color: var(--green); }
.sync-status.error { color: var(--red); }

/* ─── LOAD/PASTE PANEL ─── */
.load-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; }

.load-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }

.load-textarea:focus { border-color: var(--accent); }
.load-textarea::placeholder { color: var(--text-muted); }
.load-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn { font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); cursor: pointer; transition: all 0.15s; }
.btn:hover { border-color: var(--border-active); background: var(--bg-card-hover); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
.btn-primary:hover { background: #d4840f; border-color: #d4840f; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.load-error { font-size: 13px; color: var(--red); margin-top: 8px; display: none; }

/* ─── CLIENT HEADER ─── */

.client-name { font-family: 'Roboto Slab', serif; font-size: 18px; font-weight: 700; }

.progress-bar-container.active { display: block; }
.progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }

.progress-track { height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; width: 0%; }

/* ─── PHASES ─── */
.phases { display: none; }

.phase { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }

.phase-chevron { font-size: 14px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }

.phase-title { font-family: 'Roboto Slab', serif; font-size: 15px; font-weight: 600; flex: 1; }
.phase-timeframe { font-size: 12px; color: var(--text-muted); background: var(--bg-input); padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }

.phase-progress-mini .done { color: var(--green); }
.phase-body { display: none; border-top: 1px solid var(--border); }
.phase.open .phase-body { display: block; }

.item-check:checked { background: var(--accent); border-color: var(--accent); }

.item-content { flex: 1; min-width: 0; }
.item-task { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
.item-detail { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

      }, 2000);
    } else {
      setLocationId(locationId);
    }
  }

  function setLocationId(locationId) {
    if (currentLocationId === locationId) return;
    currentLocationId = locationId;
    console.log('[GEO] Location:', locationId);
    document.getElementById('locationIdDisplay').textContent = locationId;
    loadProgress();
  }

  function getStorageKey() {
    return GEO_CONFIG.STORAGE_PREFIX + (currentLocationId || 'default');
  }

  // ═══════════════════════════════════════════
  // PERSISTENCE: SAVE
  // ═══════════════════════════════════════════
  function setSyncStatus(status, text) {
    var el = document.getElementById('syncStatus');
    el.className = 'sync-status ' + status;
    el.textContent = text || '';
  }

  function saveState() {
    if (!currentData || !currentLocationId) return;
    clearTimeout(saveDebounceTimer);
    setSyncStatus('saving', '\u27F3 saving\u2026');

    var payload = { data: currentData, lastUpdated: new Date().toISOString(), locationId: currentLocationId };
    localStorage.setItem(getStorageKey(), JSON.stringify(payload));

    saveDebounceTimer = setTimeout(function() { saveToSheet(payload); }, 1500);
  }

  async function saveToSheet(payload) {
    if (!GEO_CONFIG.APPS_SCRIPT_URL) { setSyncStatus('saved', '\u2713 saved locally'); return; }
    try {
      // POST because geoData JSON is too large for GET URL params (~15-30KB)
      // mode: no-cors because Apps Script redirects cross-origin
      // Response is opaque (can't read it), but the data gets through
      var postData = {
        action: 'save',
        tool: GEO_CONFIG.TOOL_ID,
        locationId: currentLocationId,
        geoData: JSON.stringify(payload.data),
        lastUpdated: payload.lastUpdated,
        secretKey: GEO_CONFIG.APPS_SCRIPT_SECRET
      };
      await fetch(GEO_CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(postData)
      });
      // no-cors = opaque response, so we optimistically mark as synced
      // Load (GET) verifies on next page open
      setSyncStatus('saved', '\u2713 synced');
      console.log('[GEO] POST sent to Sheet');
    } catch (e) { setSyncStatus('error', '\u2717 sync failed'); console.warn('[GEO] Sheet save error:', e); }
    setTimeout(function() { setSyncStatus('', ''); }, 3000);
  }

  // ═══════════════════════════════════════════
  // PERSISTENCE: LOAD
  // ═══════════════════════════════════════════
  async function loadProgress() {
    if (!currentLocationId) { hideLoadingOverlay(); return; }
    var data = null;

    // Try Google Sheets first
    if (GEO_CONFIG.APPS_SCRIPT_URL) {
      try {
        var url = GEO_CONFIG.APPS_SCRIPT_URL + '?action=load&tool=' + GEO_CONFIG.TOOL_ID + '&locationId=' + currentLocationId + '&secretKey=' + GEO_CONFIG.APPS_SCRIPT_SECRET;
        var response = await fetch(url);
        var result = await response.json();
        if (result.success && result.data && result.data.geoData) {
          var geoData = typeof result.data.geoData === 'string' ? JSON.parse(result.data.geoData) : result.data.geoData;
          if (geoData && geoData.client && geoData.phases) { data = geoData; console.log('[GEO] Loaded from Sheet:', geoData.client.name); }
        }
      } catch (e) { console.log('[GEO] Sheet fetch failed, trying localStorage:', e.message); }
    }

    // Fallback: localStorage (new key format)
    if (!data) {
      var saved = localStorage.getItem(getStorageKey());
      if (saved) {
        try {
          var parsed = JSON.parse(saved);
          if (parsed.data && parsed.data.client && parsed.data.phases) { data = parsed.data; console.log('[GEO] Loaded from localStorage:', data.client.name); }
        } catch (e) {}
      }
    }

    // Fallback: scan old-format localStorage keys (pre-refactor, keyed by client URL)
    if (!data) {
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && key.startsWith('geo_checklist_') && key !== getStorageKey()) {
          try {
            var old = JSON.parse(localStorage.getItem(key));
            if (old.data && old.data.client) {
              data = old.data;
              console.log('[GEO] Migrated from old key:', key);
              localStorage.setItem(getStorageKey(), JSON.stringify({ data: data, lastUpdated: new Date().toISOString(), locationId: currentLocationId }));
              break;
            }
          } catch (e) {}
        }
      }
    }

    if (data) render(data);
    hideLoadingOverlay();
  }

  // ═══════════════════════════════════════════
  // LOADING OVERLAY
  // ═══════════════════════════════════════════
  function hideLoadingOverlay() {
    var overlay = document.getElementById('loadingOverlay');
    var app = document.getElementById('appContainer');
    if (overlay) overlay.classList.add('hidden');
    if (app) app.classList.add('loaded');
    console.log('[GEO] Content revealed');
  }

  // ═══════════════════════════════════════════
  // CORE FUNCTIONS
  // ═══════════════════════════════════════════
  function loadJSON() {
    var raw = document.getElementById('jsonInput').value.trim();
    var errorEl = document.getElementById('loadError');
    if (!raw) { errorEl.textContent = 'Paste the JSON checklist from your audit output.'; errorEl.style.display = 'block'; return; }
    try {
      var data = JSON.parse(raw);
      if (!data.client || !data.phases) throw new Error('Missing required fields: client, phases');
      errorEl.style.display = 'none';
      render(data);
      saveState();
    } catch(e) { errorEl.textContent = 'Invalid JSON: ' + e.message; errorEl.style.display = 'block'; }
  }

  function loadSample() {
    var data = JSON.parse(JSON.stringify(SAMPLE));
    render(data);
    saveState();
  }

  function switchClient() {
    currentData = null;
    document.getElementById('loadPanel').classList.remove('has-data');
    document.getElementById('clientBar').classList.remove('active');
    document.getElementById('scores').classList.remove('active');
    document.getElementById('progressContainer').classList.remove('active');
    document.getElementById('phases').classList.remove('active');
    document.getElementById('jsonInput').value = '';
  }

  function exportJSON() {
    if (!currentData) return;
    var blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = (currentData.client.url || 'checklist').replace(/[^a-z0-9]/gi, '-') + '-checklist.json'; a.click();
  }

  function exportCSV() {
    if (!currentData) return;
    var csv = 'Client,Tier,Phase,Task,Detail,Effort,Factor,Status\n';
    currentData.phases.forEach(function(phase) {
      phase.items.forEach(function(item) {
        csv += ['"' + (currentData.client.name||'').replace(/"/g,'""') + '"', currentData.client.tier||'', phase.name,
          '"' + item.task.replace(/"/g,'""') + '"', '"' + (item.detail||'').replace(/"/g,'""') + '"',
          item.effort||'', item.factor||'', item.done ? 'Done' : 'Open'].join(',') + '\n';
      });
    });
    var blob = new Blob([csv], { type: 'text/csv' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = (currentData.client.url || 'checklist').replace(/[^a-z0-9]/gi, '-') + '-checklist.csv'; a.click();
  }

  // ═══════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════
  function gradeClass(grade) {
    if (!grade) return '';
    var g = grade.replace(/[^A-F]/gi, '').charAt(0).toUpperCase();
    if (g === 'A' || g === 'B') return 'grade-a';
    if (g === 'C') return 'grade-c';
    return 'grade-d';
  }
  function effortLabel(e) { return e === 'quick-win' ? 'Quick Win' : e === 'half-day' ? 'Half Day' : e === 'multi-day' ? 'Multi-Day' : (e||''); }
  function factorLabel(f) { var m = { topical:'Topical', geographic:'Geographic', citability:'AI Citability', authority:'Authority', technical:'Technical' }; return m[f]||f||''; }

  function render(data) {
    currentData = data;
    document.getElementById('loadPanel').classList.add('has-data');
    document.getElementById('clientBar').classList.add('active');
    document.getElementById('clientName').innerHTML = data.client.name + (data.client.tier ? '<span class="tier-badge">' + data.client.tier + '</span>' : '');
    var meta = '';
    if (data.client.url) meta += '<a href="https://' + data.client.url + '" target="_blank">' + data.client.url + '</a>';
    if (data.client.city) meta += ' \u00b7 ' + data.client.city + ', ' + (data.client.state || '');
    if (data.client.auditDate) meta += ' \u00b7 Audited ' + data.client.auditDate;
    if (data.client.overallGrade) meta += ' \u00b7 Grade: <strong>' + data.client.overallGrade + '</strong>';
    document.getElementById('clientMeta').innerHTML = meta;

    var scoresEl = document.getElementById('scores');
    if (data.scores) {
      scoresEl.classList.add('active');
      scoresEl.innerHTML = Object.values(data.scores).map(function(s) {
        return '<div class="score-card"><div class="score-grade ' + gradeClass(s.grade) + '">' + s.grade + '</div><div class="score-label">' + s.label + '</div></div>';
      }).join('');
    }

    var phasesEl = document.getElementById('phases');
    phasesEl.classList.add('active');
    phasesEl.innerHTML = data.phases.map(function(phase, pi) {
      var totalItems = phase.items.length;
      var doneItems = phase.items.filter(function(i) { return i.done; }).length;
      return '<div class="phase ' + (pi === 0 ? 'open' : '') + '" data-phase="' + phase.id + '">' +
        '<div class="phase-header" onclick="GEO.togglePhase(this)">' +
          '<span class="phase-chevron">\u25b8</span>' +
          '<span class="phase-title">' + phase.name + '</span>' +
          '<span class="phase-timeframe">' + (phase.timeframe || '') + '</span>' +
          '<span class="phase-progress-mini"><span class="' + (doneItems === totalItems && totalItems > 0 ? 'done' : '') + '">' + doneItems + '</span>/' + totalItems + '</span>' +
        '</div><div class="phase-body">' +
          phase.items.map(function(item) {
            return '<div class="item ' + (item.done ? 'completed' : '') + '" data-item="' + item.id + '">' +
              '<input type="checkbox" class="item-check" ' + (item.done ? 'checked' : '') + ' onchange="GEO.toggleItem(\'' + phase.id + '\',\'' + item.id + '\',this.checked)">' +
              '<div class="item-content"><div class="item-task">' + item.task + '</div>' +
              (item.detail ? '<div class="item-detail">' + item.detail + '</div>' : '') +
              '<div class="item-tags">' +
                (item.effort ? '<span class="tag tag-effort-' + (item.effort==='quick-win'?'quick':item.effort==='half-day'?'half':'multi') + '">' + effortLabel(item.effort) + '</span>' : '') +
                (item.factor ? '<span class="tag tag-factor">' + factorLabel(item.factor) + '</span>' : '') +
              '</div></div></div>';
          }).join('') +
        '</div></div>';
    }).join('');

    updateProgress();
    document.getElementById('progressContainer').classList.add('active');
  }

  function togglePhase(headerEl) { headerEl.closest('.phase').classList.toggle('open'); }

  function toggleItem(phaseId, itemId, checked) {
    if (!currentData) return;
    for (var p = 0; p < currentData.phases.length; p++) {
      if (currentData.phases[p].id === phaseId) {
        for (var i = 0; i < currentData.phases[p].items.length; i++) {
          if (currentData.phases[p].items[i].id === itemId) { currentData.phases[p].items[i].done = checked; break; }
        }
        break;
      }
    }
    var itemEl = document.querySelector('[data-item="' + itemId + '"]');
    if (itemEl) itemEl.classList.toggle('completed', checked);

    var phaseEl = document.querySelector('[data-phase="' + phaseId + '"]');
    if (phaseEl) {
      var phase = currentData.phases.find(function(p) { return p.id === phaseId; });
      var done = phase.items.filter(function(i) { return i.done; }).length;
      var total = phase.items.length;
      phaseEl.querySelector('.phase-progress-mini').innerHTML = '<span class="' + (done === total && total > 0 ? 'done' : '') + '">' + done + '</span>/' + total;
    }
    updateProgress();
    saveState();
  }

  function updateProgress() {
    if (!currentData) return;
    var total = 0, done = 0;
    currentData.phases.forEach(function(p) { p.items.forEach(function(i) { total++; if (i.done) done++; }); });
    document.getElementById('progressDone').textContent = done;
    document.getElementById('progressTotal').textContent = total;
    document.getElementById('progressFill').style.width = (total ? Math.round((done / total) * 100) : 0) + '%';
  }

  // ═══════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initializeLocationDetection); }
  else { initializeLocationDetection(); }

  // Public API
  return {
    loadJSON: loadJSON, loadSample: loadSample, switchClient: switchClient,
    exportJSON: exportJSON, exportCSV: exportCSV, togglePhase: togglePhase, toggleItem: toggleItem,
    getState: function() { return { currentData: currentData, locationId: currentLocationId }; },
    reset: function() { localStorage.removeItem(getStorageKey()); location.reload(); }
  };
})();
</script>
</body>
</html>
